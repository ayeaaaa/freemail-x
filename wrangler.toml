name = "freemail-wen"
main = "src/server.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
keep_vars=true

# D1 数据库绑定（邮件链路 Worker 当前不使用，暂保留避免误删）
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "freemail-wen-db"
database_id = "your-d1-database-id"
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="admin"
ADMIN_PASSWORD="your-admin-password"
GUEST_PASSWORD="guest"
JWT_TOKEN="your-jwt-token"
JWT_TOKENGUEST_PASSWORD="dfsfsfxzcv"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="ayeaaa.cloudns.biz,egtwy.cloudns.biz,362342.xyz,999989999.xyz,no18.ggff.net,ip4.dpdns.org,ip6.dpdns.org,woow.dpdns.org,ayeaaa.cloudns.org"
RESEND_API_KEY=""
# VPS 薄 API 数据库配置（正式方案）
DB_API_URL="http://your-vps-host:18080"
DB_API_TOKEN="your-api-token"



# 静态资源目录（邮件链路 Worker 当前不使用，暂保留避免误删）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 绑定已移除（无 R2 模式，只保留正文和元数据）

# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true
